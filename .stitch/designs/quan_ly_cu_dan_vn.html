<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quản lý Cư dân</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 font-display min-h-screen pb-20">
<div class="max-w-md mx-auto relative h-screen overflow-y-auto">
<header class="pt-12 pb-6 px-4 sticky top-0 bg-background-light dark:bg-background-dark z-10">
<h1 class="text-2xl font-bold">Quản lý Cư dân</h1>
</header>
<main class="px-4 space-y-8">
<section>
<h2 class="text-lg font-bold mb-4">Công việc cần duyệt</h2>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col justify-between min-h-[120px]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-500">
<span class="material-icons-outlined">people</span>
</div>
<span class="text-2xl font-bold">0</span>
</div>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-4 leading-tight">Cư dân chờ duyệt</p>
</div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col justify-between min-h-[120px]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-500">
<span class="material-icons-outlined">directions_car</span>
</div>
<span class="text-2xl font-bold">0</span>
</div>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-4 leading-tight">Phương tiện chờ duyệt</p>
</div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col justify-between min-h-[120px]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center text-yellow-600">
<span class="material-icons-outlined">description</span>
</div>
<span class="text-2xl font-bold">0</span>
</div>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-4 leading-tight">Tạm trú chờ duyệt</p>
</div>
<div class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col justify-between min-h-[120px]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-500">
<span class="material-icons-outlined">chat_bubble_outline</span>
</div>
<span class="text-2xl font-bold">0</span>
</div>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-4 leading-tight">Phản ánh chờ duyệt</p>
</div>
</div>
</section>
<section>
<h2 class="text-lg font-bold mb-4">Thông tin cư dân</h2>
<div class="space-y-3">
<button class="w-full bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex items-center justify-between active:bg-gray-50 dark:active:bg-slate-700 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-icons-outlined">people</span>
</div>
<span class="font-medium text-gray-800 dark:text-gray-200">Danh sách cư dân</span>
</div>
<span class="material-icons-outlined text-gray-400">chevron_right</span>
</button>
<button class="w-full bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex items-center justify-between active:bg-gray-50 dark:active:bg-slate-700 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-icons-outlined">directions_car</span>
</div>
<span class="font-medium text-gray-800 dark:text-gray-200">Danh sách phương tiện</span>
</div>
<span class="material-icons-outlined text-gray-400">chevron_right</span>
</button>
<button class="w-full bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex items-center justify-between active:bg-gray-50 dark:active:bg-slate-700 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-icons-outlined">description</span>
</div>
<span class="font-medium text-gray-800 dark:text-gray-200">Danh sách tạm trú</span>
</div>
<span class="material-icons-outlined text-gray-400">chevron_right</span>
</button>
<button class="w-full bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-slate-700 flex items-center justify-between active:bg-gray-50 dark:active:bg-slate-700 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-icons-outlined">chat_bubble_outline</span>
</div>
<span class="font-medium text-gray-800 dark:text-gray-200">Danh sách phản ánh</span>
</div>
<span class="material-icons-outlined text-gray-400">chevron_right</span>
</button>
</div>
</section>
</main>
<nav class="fixed bottom-0 w-full max-w-md bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 px-2 py-2 flex justify-between items-center pb-safe">
<button class="flex flex-col items-center p-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white w-1/5">
<span class="material-icons-outlined mb-1">home</span>
<span class="text-[10px] font-medium">Trang chủ</span>
</button>
<button class="flex flex-col items-center p-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white w-1/5">
<span class="material-icons-outlined mb-1">account_balance_wallet</span>
<span class="text-[10px] font-medium">Tài chính</span>
</button>
<button class="flex flex-col items-center p-2 text-primary w-1/5 relative">
<div class="absolute top-0 w-8 h-1 bg-primary rounded-b-full"></div>
<span class="material-icons-outlined mb-1 mt-1">people</span>
<span class="text-[10px] font-medium">Cư dân</span>
</button>
<button class="flex flex-col items-center p-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white w-1/5">
<span class="material-icons-outlined mb-1">apartment</span>
<span class="text-[10px] font-medium">Căn hộ</span>
</button>
<button class="flex flex-col items-center p-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white w-1/5">
<span class="material-icons-outlined mb-1">settings</span>
<span class="text-[10px] font-medium">Cài đặt</span>
</button>
</nav>
<div class="fixed bottom-0 w-full max-w-md h-5 bg-white dark:bg-slate-800">
<div class="w-1/3 h-1 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mt-2"></div>
</div>
</div>

</body></html>
