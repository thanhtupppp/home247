        body { font-family: 'Inter', sans-serif; }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface shadow-sm z-40">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 w-full">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-150 text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary">Tạo hợp đồng mới</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="px-margin-mobile md:px-margin-desktop py-lg max-w-3xl mx-auto space-y-lg">
<!-- Section: Thông tin khách thuê -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-md">
<h2 class="font-title-lg text-title-lg text-on-surface mb-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary">person</span> Thông tin khách thuê
            </h2>
<div class="space-y-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Họ và tên</label>
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3" placeholder="Nhập họ và tên" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Số điện thoại</label>
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3" placeholder="Nhập số điện thoại" type="tel"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Email</label>
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3" placeholder="Nhập email" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Địa chỉ thường trú</label>
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3" placeholder="Nhập địa chỉ" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md mt-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">Căn cước công dân (Mặt trước)</label>
<div class="border-2 border-dashed border-outline-variant rounded-xl p-md flex flex-col items-center justify-center bg-surface hover:bg-surface-container transition-colors cursor-pointer aspect-video relative overflow-hidden group">
<span class="material-symbols-outlined text-4xl text-tertiary-container mb-2 group-hover:text-primary transition-colors">add_a_photo</span>
<span class="font-body-md text-body-md text-tertiary-container group-hover:text-primary transition-colors">Tải ảnh lên</span>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">Căn cước công dân (Mặt sau)</label>
<div class="border-2 border-dashed border-outline-variant rounded-xl p-md flex flex-col items-center justify-center bg-surface hover:bg-surface-container transition-colors cursor-pointer aspect-video relative overflow-hidden group">
<span class="material-symbols-outlined text-4xl text-tertiary-container mb-2 group-hover:text-primary transition-colors">add_a_photo</span>
<span class="font-body-md text-body-md text-tertiary-container group-hover:text-primary transition-colors">Tải ảnh lên</span>
</div>
</div>
</div>
</div>
</section>
<!-- Section: Chọn phòng -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-md">
<h2 class="font-title-lg text-title-lg text-on-surface mb-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary">apartment</span> Chọn phòng
            </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Tòa nhà</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3 pr-10">
<option value="">Chọn tòa nhà</option>
<option value="b1">Tòa nhà Alpha</option>
<option value="b2">Tòa nhà Beta</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Phòng</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3 pr-10">
<option value="">Chọn phòng</option>
<option value="r1">P.101</option>
<option value="r2">P.102</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Section: Thông tin hợp đồng -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-md">
<h2 class="font-title-lg text-title-lg text-on-surface mb-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary">description</span> Thông tin hợp đồng
            </h2>
<div class="space-y-md">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Ngày ký hợp đồng</label>
<div class="relative">
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3" type="date"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Ngày bắt đầu</label>
<div class="relative">
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3" type="date"/>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Tiền phòng / tháng (VNĐ)</label>
<div class="relative">
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright font-numeric-data text-numeric-data p-3 pr-12 text-right" placeholder="0" type="text"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">đ</span>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block font-label-md text-label-md text-on-surface-variant">Tiền cọc (VNĐ)</label>
<label class="inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="relative w-9 h-5 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-outline-variant after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-container"></div>
<span class="ms-2 font-label-md text-label-md text-on-surface-variant">Có cọc</span>
</label>
</div>
<div class="relative">
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright font-numeric-data text-numeric-data p-3 pr-12 text-right" placeholder="0" type="text"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">đ</span>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Chu kỳ trả tiền</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright text-body-md font-body-md p-3 pr-10">
<option value="1">1 tháng / lần</option>
<option value="3">3 tháng / lần</option>
<option value="6">6 tháng / lần</option>
<option value="12">1 năm / lần</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1">Ngày thu tiền hàng tháng</label>
<div class="relative">
<input class="w-full rounded-lg border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim bg-surface-bright font-numeric-data text-numeric-data p-3" max="31" min="1" placeholder="Ví dụ: 5" type="number"/>
</div>
</div>
</div>
</div>
</section>
<!-- Footer Action -->
<div class="pt-md pb-xl">
<button class="w-full bg-primary-container text-on-primary rounded-xl py-4 font-title-lg text-title-lg shadow-md hover:bg-primary transition-colors active:scale-95 duration-150">
                Tạo hợp đồng
            </button>
</div>
</main>
<!-- BottomNavBar (Hidden on md and up based on design system rules, but since this is a deep screen, the JSON instructions say BottomNav is contextual. However, the prompt explicitly requested BottomNavBar component. Implementing per JSON.) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-lowest shadow-[0_-2px_10px_rgba(0,0,0,0.04)] rounded-t-xl">
<!-- Home Tab -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md mt-1">Home</span>
</button>
<!-- Rooms Tab -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="door_front" data-weight="fill" style="font-variation-settings: 'FILL' 1;">door_front</span>
<span class="font-label-md text-label-md mt-1">Rooms</span>
</button>
<!-- Bills Tab -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label-md text-label-md mt-1">Bills</span>
</button>
<!-- Reports Tab -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-md text-label-md mt-1">Reports</span>
</button>
</nav>
</body></html>
