<body class="bg-background text-on-surface min-h-screen pb-24 md:pb-0 font-body-md">
<!-- Main Content Canvas -->
<main class="w-full max-w-[1280px] mx-auto md:px-gutter px-margin-mobile pt-md md:pt-lg flex flex-col gap-lg">
<!-- Custom Header Card -->
<header class="bg-surface-container-lowest rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] p-4 flex items-center justify-between w-full">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-outline-variant flex items-center justify-center overflow-hidden shrink-0">
<span class="material-symbols-outlined text-surface-container-lowest text-[32px]" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface-variant">Xin chào,</span>
<span class="font-title-lg text-title-lg text-on-surface font-bold">tu</span>
</div>
</div>
<button class="relative w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center text-primary transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-2 right-2 w-4 h-4 bg-[#ff4d4d] rounded-full flex items-center justify-center text-[10px] font-bold text-white border-2 border-surface-container-high">1</span>
</button>
</header>
<!-- Management Section -->
<section class="flex flex-col gap-4">
<h2 class="font-title-lg text-title-lg text-on-surface font-bold">Quản lý</h2>
<div class="grid grid-cols-3 gap-3 md:gap-4">
<!-- Item 1: Điện nước -->
<button class="bg-surface-container-lowest rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-outline-variant/30 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-secondary" data-icon="bolt">bolt</span>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold text-center">Điện nước</span>
</button>
<!-- Item 2: Hoá đơn -->
<button class="bg-surface-container-lowest rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-outline-variant/30 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-primary" data-icon="description">description</span>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold text-center">Hoá đơn</span>
</button>
<!-- Item 3: Thống kê -->
<button class="bg-surface-container-lowest rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-outline-variant/30 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-[#e6f4ea] flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-[#137333]" data-icon="analytics">analytics</span>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold text-center">Thống kê</span>
</button>
<!-- Item 4: Hợp đồng -->
<button class="bg-surface-container-lowest rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-outline-variant/30 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-[#f3e8fd] flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-[#681da8]" data-icon="group">group</span>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold text-center">Hợp đồng</span>
</button>
<!-- Item 5: Dịch vụ -->
<button class="bg-surface-container-lowest rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-outline-variant/30 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-[#e0f2f1] flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-[#00695c]" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold text-center">Dịch vụ</span>
</button>
<!-- Item 6: Thiết bị -->
<button class="bg-surface-container-lowest rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-outline-variant/30 shadow-[0_2px_4px_rgba(0,0,0,0.02)] transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-12 h-12 rounded-full bg-tertiary-fixed flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-tertiary" data-icon="router">router</span>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold text-center">Thiết bị</span>
</button>
</div>
</section>
<!-- To-Do Section -->
<section class="flex flex-col gap-4 mt-2">
<h2 class="font-title-lg text-title-lg text-on-surface font-bold">Công việc cần làm</h2>
<div class="bg-surface-container-lowest rounded-2xl p-8 flex flex-col items-center justify-center gap-4 shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-outline-variant/20 min-h-[160px]">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="check_circle">check_circle</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Không có công việc nào cần làm</p>
</div>
</section>

<div class="w-12 h-8 rounded-full bg-primary-container/20 flex items-center justify-center mb-1">

<span class="font-label-md text-label-md text-primary">Home</span>
</a>
<!-- Inactive Tab: Finance -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container dark:hover:bg-on-tertiary-fixed-variant transition-all rounded-lg p-2 min-w-[64px] opacity-80 hover:opacity-100" href="#">
<div class="w-12 h-8 rounded-full flex items-center justify-center mb-1">

<div class="w-12 h-8 rounded-full flex items-center justify-center mb-1">

<div class="w-12 h-8 rounded-full flex items-center justify-center mb-1">
<span class="material-symbols-outlined" data-icon="apartment">apartment</span>

<div class="w-12 h-8 rounded-full flex items-center justify-center mb-1">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
<span class="font-label-md text-label-md">Settings</span>
</a>
</nav>

<span class="font-label-md text-label-md font-bold">Home</span>

<a class="flex items-center gap-3 p-3 rounded-lg text-outline-variant hover:bg-on-tertiary-fixed-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-label-md text-label-md">Finance</span>

<a class="flex items-center gap-3 p-3 rounded-lg text-outline-variant hover:bg-on-tertiary-fixed-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-label-md text-label-md">Residents</span>

<a class="flex items-center gap-3 p-3 rounded-lg text-outline-variant hover:bg-on-tertiary-fixed-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="apartment">apartment</span>
<span class="font-label-md text-label-md">Rooms</span>
</a>
<a class="flex items-center gap-3 p-3 rounded-lg text-outline-variant hover:bg-on-tertiary-fixed-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
